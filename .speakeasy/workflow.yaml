workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    Gando Partner API:
        inputs:
            - location: ./partner.json
        output: .speakeasy/out.openapi.yaml
        registry:
            location: registry.speakeasyapi.dev/olivierdevmaster/workspace-1/gando-partner-api
targets:
    gando:
        target: php
        source: Gando Partner API
        publish:
            packagist:
                username: $packagist_username
                token: $packagist_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/olivierdevmaster/workspace-1/gando-partner-api-php-code-samples
            labelOverride:
                fixedValue: Php (SDK)
            blocking: false
